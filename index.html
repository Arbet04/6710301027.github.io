<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Software Engineering Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Software Engineering Quiz</h1>
      <p>Practice multiple-choice questions with instant scoring.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="row">
        <h2>Section 1: Multiple Choice</h2>

        <!-- Controls: Practice + Language + Restart -->
        <div class="controls">
          <label class="toggle">
            <input id="practiceToggle" type="checkbox" />
            <span id="practiceLabel">Practice mode (instant feedback)</span>
          </label>

          <!-- button shows the OTHER language to switch to -->
          <button id="langBtn" class="btn secondary" type="button">TH</button>
          <button id="restartBtn" class="btn secondary" type="button">Restart</button>
        </div>
      </div>

      <div id="quiz"></div>

      <div class="actions">
        <button id="submitBtn" class="btn" type="button">Submit</button>
      </div>

      <div id="summary" class="summary" hidden></div>
    </section>
  </main>

  <!-- ✅ cache-buster: change v= number whenever you update script.js -->
  <script src="script.js?v=3"></script>
</body>
</html>
