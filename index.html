<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>แบบทดสอบ Software Engineering</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>แบบทดสอบ Software Engineering</h1>
      <p>ฝึกทำข้อสอบ ปรับยาก-ง่าย พร้อมสรุปคะแนนทันที</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="row">
        <h2>ส่วนที่ 1: ปรนัย (Multiple Choice)</h2>
        <button id="restartBtn" class="btn secondary" type="button">เริ่มใหม่</button>
      </div>
      <div id="quiz"></div>

      <div class="actions">
        <button id="submitBtn" class="btn" type="button">Submit</button>
      </div>

      <div id="summary" class="summary" hidden></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
